apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    tier: data
spec:
  serviceName: nifi
  replicas: 1
  selector:
    matchLabels:
      app: nifi
  template:
    metadata:
      labels:
        app: nifi
        tier: data
    spec:
      containers:
        - name: nifi
          image: apache/nifi:1.25.0
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: nifi-secret
          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/state
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/content_repository
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/flowfile_repository
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/provenance_repository
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/database_repository
      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data-pvc
