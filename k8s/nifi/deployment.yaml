apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow
  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
        access: internal   # for future NetworkPolicy
    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest

          ports:
            - containerPort: 8080
            - containerPort: 8443

          env:
            # --- INTERNAL HTTP (for probes ONLY) ---
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"

            # --- EXTERNAL HTTPS ---
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"

            # REQUIRED for ingress / SNI
            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

            # JVM
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

          # ---------------------------
          # PROBES (HTTP ONLY!)
          # ---------------------------
          startupProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 20
            failureThreshold: 5
            timeoutSeconds: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
