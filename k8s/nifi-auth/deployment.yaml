apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow

  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
        access: internal

    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest

          ports:
            - containerPort: 8443

          env:
            # HTTPS
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"

            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

            # Heap
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

            # OIDC CONFIG FROM CONFIGMAP
            - name: OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_CLIENT_ID

            - name: OIDC_DISCOVERY_URL
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_DISCOVERY_URL

            - name: NIFI_EXTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: NIFI_EXTERNAL_URL

            # SECRET
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nifi-oidc-secret
                  key: OIDC_CLIENT_SECRET

          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

            # template mount
            - name: nifi-config
              mountPath: /opt/nifi/conf

            # override startup script
            - name: start-script
              mountPath: /start-nifi.sh
              subPath: start-nifi.sh

          command: ["/bin/bash", "/start-nifi.sh"]

          startupProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10

          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 240
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data

        # mount template directory
        - name: nifi-config
          configMap:
            name: nifi-config-map

        # startup script
        - name: start-script
          configMap:
            name: nifi-start-script
            defaultMode: 0755
