apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow

  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend

    spec:
      initContainers:
        - name: render-nifi-config
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache gettext
              echo "Rendering nifi.properties..."
              envsubst < /config/nifi.properties.tpl > /rendered/nifi.properties

          env:
            - name: OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_CLIENT_ID

            - name: OIDC_DISCOVERY_URL
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_DISCOVERY_URL

            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nifi-oidc-secret
                  key: OIDC_CLIENT_SECRET

            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

          volumeMounts:
            - name: nifi-config
              mountPath: /config

            - name: rendered-config
              mountPath: /rendered

      containers:
        - name: nifi
          image: apache/nifi:1.26.0

          ports:
            - containerPort: 8443

          env:
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"

            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

            - name: NIFI_JVM_HEAP_INIT
              value: "1g"

            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          command:
            - /bin/bash
            - -c
            - |
              echo "Copying rendered config..."
              cp /opt/nifi/custom-conf/nifi.properties /opt/nifi/nifi-current/conf/nifi.properties
          
              echo "Starting NiFi in foreground..."
              exec /opt/nifi/nifi-current/bin/nifi.sh run &
              tail -f /opt/nifi/nifi-current/logs/nifi-app.log
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

            - name: rendered-config
              mountPath: /opt/nifi/custom-conf

          startupProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10

          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 240
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data

        - name: nifi-config
          configMap:
            name: nifi-config-map

        - name: rendered-config
          emptyDir: {}
