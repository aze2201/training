apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend

spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow

  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend

    spec:
      initContainers:
        - name: render-nifi-config
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache gettext
              echo "Rendering nifi.properties..."
              envsubst < /config/nifi.properties.tpl > /rendered/nifi.properties
              envsubst < /config/login-identity-providers.tpl > /rendered/login-identity-providers.xml
              cp /config/authorizers.xml /rendered/authorizers.xml
          env:
            - name: OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_CLIENT_ID

            - name: OIDC_DISCOVERY_URL
              valueFrom:
                configMapKeyRef:
                  name: nifi-oidc-config
                  key: OIDC_DISCOVERY_URL

            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nifi-oidc-secret
                  key: OIDC_CLIENT_SECRET

            - name: SINGLE_USER_CREDENTIALS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nifi-oidc-secret
                  key: SINGLE_USER_CREDENTIALS_USERNAME
                  
            - name: SINGLE_USER_CREDENTIALS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nifi-oidc-secret
                  key: SINGLE_USER_CREDENTIALS_PASSWORD

            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

          volumeMounts:
            - name: nifi-config
              mountPath: /config

            - name: rendered-config
              mountPath: /rendered

      containers:
        - name: nifi
          image: apache/nifi:1.26.0

          ports:
            - containerPort: 8443

          env:
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"

            - name: NIFI_WEB_PROXY_HOST
              value: pipeline.z-script.io

            - name: NIFI_JVM_HEAP_INIT
              value: "1g"

            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          command:
            - /bin/bash
            - -c
            - |
              echo "Copying rendered config..."
              cp /opt/nifi/custom-conf/nifi.properties /opt/nifi/nifi-current/conf/nifi.properties
              cp /opt/nifi/custom-conf/login-identity-providers.xml /opt/nifi/nifi-current/conf/login-identity-providers.xml
              cp /opt/nifi/custom-conf/authorizers.xml /opt/nifi/nifi-current/conf/authorizers.xml
          
              echo "Starting NiFi..."
              /opt/nifi/nifi-current/bin/nifi.sh run &
              sleep 10s
              password=$(cat conf/nifi.properties | grep nifi.security.truststorePasswd | awk -v FS='=' '{print $2}')
              openssl s_client -connect auth.z-script.io:443 -showcerts 2>/dev/null </dev/null | awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/{ print }' > /tmp/keycloak-chain.pem
              keytool -import -alias keycloak-chain   -file /tmp/keycloak-chain.pem   -keystore ./conf/truststore.p12   -storetype PKCS12   -storepass ${password}    -noprompt
          
              echo "Waiting for NiFi logs..."
              while [ ! -f /opt/nifi/nifi-current/logs/nifi-app.log ]; do
                sleep 2
              done
          
              echo "Tailing logs..."
              tail -F /opt/nifi/nifi-current/logs/nifi-app.log
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

            - name: rendered-config
              mountPath: /opt/nifi/custom-conf

          startupProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 10

          livenessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 240
            periodSeconds: 20
            failureThreshold: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data

        - name: nifi-config
          configMap:
            name: nifi-config-map

        - name: rendered-config
          emptyDir: {}
