apiVersion: v1
kind: ConfigMap
metadata:
  name: nifi-config-map
  namespace: nifi

data:

  authorizers.xml: |
    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
    <authorizers>
      <userGroupProvider>
        <identifier>file-user-group-provider</identifier>
        <class>org.apache.nifi.authorization.FileUserGroupProvider</class>
        <property name="Users File">./conf/users.xml</property>
        <property name="Initial User Identity 1">*</property>
      </userGroupProvider>

      <accessPolicyProvider>
        <identifier>file-access-policy-provider</identifier>
        <class>org.apache.nifi.authorization.FileAccessPolicyProvider</class>
        <property name="User Group Provider">file-user-group-provider</property>
        <property name="Authorizations File">./conf/authorizations.xml</property>
        <property name="Initial Admin Identity">*</property>
      </accessPolicyProvider>

      <authorizer>
        <identifier>managed-authorizer</identifier>
        <class>org.apache.nifi.authorization.StandardManagedAuthorizer</class>
        <property name="Access Policy Provider">file-access-policy-provider</property>
      </authorizer>
    </authorizers>


  login-identity-providers.xml: |
    <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
    <loginIdentityProviders>
      <provider>
        <identifier>oidc-provider</identifier>

        <!-- ✅ CORRECT CLASS -->
        <class>org.apache.nifi.web.security.oidc.OidcIdentityProvider</class>

        <property name="Discovery URL">${OIDC_DISCOVERY_URL}</property>
        <property name="Client ID">${OIDC_CLIENT_ID}</property>
        <property name="Client Secret">${OIDC_CLIENT_SECRET}</property>

        <!-- MUST match Keycloak EXACTLY -->
        <property name="Redirect URI">https://pipeline.z-script.io/nifi-api/access/oidc/callback</property>

        <property name="Preferred JWS Algorithm">RS256</property>
        <property name="Claim Identifying User">preferred_username</property>
        <property name="Additional Scopes">openid,email,profile</property>
      </provider>
    </loginIdentityProviders>


  nifi.properties.tpl: |
    nifi.web.https.port=8443

    nifi.security.user.authorizer=managed-authorizer
    nifi.security.allow.anonymous.authentication=false

    nifi.login.identity.provider.configuration.file=./conf/login-identity-providers.xml
    nifi.security.user.login.identity.provider=oidc-provider

    # OIDC settings
    nifi.security.user.oidc.discovery.url=${OIDC_DISCOVERY_URL}
    nifi.security.user.oidc.client.id=${OIDC_CLIENT_ID}
    nifi.security.user.oidc.client.secret=${OIDC_CLIENT_SECRET}
    nifi.security.user.oidc.claim.identifying.user=preferred_username
    nifi.security.user.oidc.additional.scopes=openid,email,profile

    # Proxy (Cloudflare / ingress)
    nifi.web.proxy.host=pipeline.z-script.io
    nifi.web.proxy.context.path=/nifi

    # TLS (must exist via Secret)
    nifi.security.keystore=./conf/keystore.p12
    nifi.security.keystoreType=PKCS12
    nifi.security.keystorePasswd=${KEYSTORE_PASSWORD}
    nifi.security.keyPasswd=${KEY_PASSWORD}

    nifi.security.truststore=./conf/truststore.p12
    nifi.security.truststoreType=PKCS12
    nifi.security.truststorePasswd=${TRUSTSTORE_PASSWORD}
