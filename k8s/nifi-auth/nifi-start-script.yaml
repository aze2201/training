apiVersion: v1
kind: ConfigMap
metadata:
  name: nifi-start-script
  namespace: nifi
data:
  start-nifi.sh: |
    #!/bin/bash
    set -e

    echo "Rendering NiFi config..."

    envsubst < /opt/nifi/conf/nifi.properties.tpl > /opt/nifi/nifi-current/conf/nifi.properties

    echo "Starting NiFi..."
    exec /opt/nifi/nifi-current/bin/nifi.sh run
