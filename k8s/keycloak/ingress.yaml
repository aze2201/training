apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  labels:
    app: keycloak
    tier: auth
  annotations:
  	kubernetes.io/ingress.class: nginx
	nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
	nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
	
spec:
  ingressClassName: nginx
  rules:
    - host: auth.z-script.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
