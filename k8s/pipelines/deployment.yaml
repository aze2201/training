apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow
  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
            - name: NIFI_WEB_PROXY_HOST
              value: "pipelne.z-script.io"
          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data
          readinessProbe:
            httpGet:
              path: /nifi
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nifi
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
