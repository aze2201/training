apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nifi
      component: dataflow

  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
        access: internal

    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8443

          env:
            # INTERNAL (for Kubernetes probes)
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"

            # EXTERNAL (for ingress / cloudflare)
            - name: NIFI_WEB_HTTPS_PORT
              value: "8443"

            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

          # =========================
          # STARTUP PROBE (HTTP ONLY)
          # =========================
          startupProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            periodSeconds: 10
            failureThreshold: 30

          # =========================
          # READINESS PROBE
          # =========================
          readinessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10

          # =========================
          # LIVENESS PROBE
          # =========================
          livenessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8080
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
