apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow
  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080

          env:
            # FORCE HTTP MODE
            - name: NIFI_WEB_HTTP_PORT
              value: "8080"
            - name: NIFI_WEB_HTTPS_PORT
              value: ""

            - name: NIFI_WEB_PROXY_HOST
              value: "pipeline.z-script.io"

            # JVM tuning (IMPORTANT)
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

          readinessProbe:
            httpGet:
              path: /nifi
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /nifi
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
