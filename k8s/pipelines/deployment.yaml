apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nifi
      component: dataflow

  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
        access: internal   # future NetworkPolicy selector (not used yet)

    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: https
              containerPort: 8443
              protocol: TCP

          env:
            # JVM tuning (important for stability)
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

          # -------------------------
          # STARTUP PROBE (CRITICAL)
          # prevents liveness killing NiFi during boot
          # -------------------------
          startupProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8443
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 30   # ~5 minutes grace time

          # -------------------------
          # READINESS PROBE
          # -------------------------
          readinessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10

          # -------------------------
          # LIVENESS PROBE
          # -------------------------
          livenessProbe:
            httpGet:
              path: /nifi-api/access/config
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
