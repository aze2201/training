apiVersion: apps/v1
kind: Deployment
metadata:
  name: nifi
  namespace: nifi
  labels:
    app: nifi
    component: dataflow
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nifi
      component: dataflow
  template:
    metadata:
      labels:
        app: nifi
        component: dataflow
        tier: backend
        access: internal  
    spec:
      containers:
        - name: nifi
          image: apache/nifi:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: https
              containerPort: 8443
              protocol: TCP

          env:
            # JVM tuning
            - name: NIFI_JVM_HEAP_INIT
              value: "1g"
            - name: NIFI_JVM_HEAP_MAX
              value: "2g"

            # (FOR LATER - DO NOT ENABLE YET)
            # - name: NIFI_WEB_PROXY_HOST
            #   value: "pipeline.z-script.io"

          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "1"

          volumeMounts:
            - name: nifi-data
              mountPath: /opt/nifi/nifi-current/data

          readinessProbe:
            httpGet:
              path: /nifi
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /nifi
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6

      volumes:
        - name: nifi-data
          persistentVolumeClaim:
            claimName: nifi-data
