apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nifi-ingress
  namespace: nifi

  annotations:
    kubernetes.io/ingress.class: nginx

    # IMPORTANT for HTTPS upstream (NiFi uses self-signed cert)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

    # avoid redirect loops with Cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # future network policy hook (important labeling hook)
    ingress.kubernetes.io/allowed-ips: "0.0.0.0/0"

spec:
  tls:
    - hosts:
        - pipeline.z-script.io
      secretName: nifi-tls-secret   # replace if Cloudflare-managed

  rules:
    - host: pipeline.z-script.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nifi-service
                port:
                  number: 8443
