apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nifi-ingress
  namespace: nifi
  annotations:
    kubernetes.io/ingress.class: nginx

    # IMPORTANT: NiFi backend is HTTPS
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"

    # avoid redirect loops
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

spec:
  tls:
    - hosts:
        - pipeline.z-script.io
      secretName: nifi-tls-secret   # or your Cloudflare setup

  rules:
    - host: pipeline.z-script.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nifi-service
                port:
                  number: 8443
